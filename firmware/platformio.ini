; ============================================================================
; Sensormeter WLAN - generisches ESP32-WROOM-32 DevKit
; PlatformIO Projektkonfiguration
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; P0: nur WiFi (Arduino-Kern, keine lib_deps noetig). Weitere Bibliotheken
; (DHT, SSD1306, ESPAsyncWebServer, SNMP_Agent, tinyxml2) kommen phasenweise
; dazu, siehe docs/implementierungsplan.html.
lib_deps =

build_flags =
    -D CORE_DEBUG_LEVEL=1
