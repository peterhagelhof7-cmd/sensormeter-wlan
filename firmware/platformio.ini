; ============================================================================
; Sensormeter WLAN - generisches ESP32-WROOM-32 DevKit
; PlatformIO Projektkonfiguration
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; ConfigManager/BrandingManager/GraphManager verwenden zur Laufzeit LittleFS
; (LittleFS.begin(true)) - ohne dieses Flag baut "pio run --target uploadfs"
; faelschlich ein SPIFFS-Image, das nicht zur bereits LittleFS-formatierten
; Partition passt.
board_build.filesystem = littlefs

; PlatformIO-Standardschema (default.csv) reserviert eine Datenpartition
; (~1,3 MB), die genauso gross wie eine App-Partition ist - tatsaechlich
; genutzt werden dort aber nur config.xml, history.csv und optional ein
; 1 KB Branding-Logo (ein paar KB insgesamt). "min_spiffs.csv" (im
; Framework-Paket enthalten, kein eigenes File noetig) gibt der
; Datenpartition nur noch 128 KB und je Ota-Slot dafuer ~1,88 MB statt
; ~1,31 MB - deutlich mehr Luft, ohne OTA-Sicherheit (zwei Slots bleiben
; erhalten) oder echte Funktionalitaet zu verlieren. Siehe
; docs/entscheidungen.md.
board_build.partitions = min_spiffs.csv

monitor_speed = 115200
upload_speed = 921600

; tinyxml2 liegt vendort in lib/tinyxml2/ (nur die 2 benoetigten Quelldateien,
; siehe lib/tinyxml2/README.md, identisch zum Sensormeter-Projekt) - keine
; lib_deps-Deklaration noetig.
;
; Weitere Bibliotheken (ESPAsyncWebServer, SNMP_Agent) kommen phasenweise
; dazu, siehe docs/implementierungsplan.html.
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.9
    esp32async/ESPAsyncWebServer@^3.11.2
    esp32async/AsyncTCP@^3.4.10
    bblanchon/ArduinoJson@^7.4.3
    0neblock/SNMP_Agent@^2.1.0
    marian-craciunescu/ESP32Ping@^1.7
    knolleary/PubSubClient@^2.8

build_flags =
    -D CORE_DEBUG_LEVEL=1
